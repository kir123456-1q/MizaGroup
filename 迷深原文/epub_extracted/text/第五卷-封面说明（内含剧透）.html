<div class="calibre4">
    （内含5、6卷内容剧透！请在正文阅毕后阅读）<br class="calibre4"/>
■代行舟楫之用的棺柩（已死之身的诺文的象征）。<br class="calibre4"/>
■为棺柩做向导（将诺文引向自己真正的愿望）的涡波。<br class="calibre4"/>
■背对涡波望向相反方向（诺文因留恋得不到实现而永不消失的未来）的莉帕。<br class="calibre4"/>
■莉帕乘在棺柩（诺文）之上→依存于诺文。<br class="calibre4"/>
■上卷置身于以水下为意象的虚假世界，中卷已从中出离，故而场景为水面之上。<br class="calibre4"/>
■涡波拿着的地图和罗盘→喻其为先导之人。<br class="calibre4"/>
■莉帕在用望远镜远望→对镜中那一抹光景的强烈渴望。<br class="calibre4"/>
■飘散在水面上的纸一般了无色彩的花瓣→荣光与英雄等误认的留恋的残骸<br class="calibre4"/>
■蜡烛→送别诺文的灯火。孩子们。<br class="calibre4"/>
■晚霞→太阳的陨落→挚友的死。<br class="calibre4"/>
</div>
